# Cart-Pole PID Control — Global Configuration
#
# Outer loop: y → theta_ref,  Inner loop: theta → F

model:
  M_c: 1.0
  m_p: 0.1
  L: 0.5
  I: -1.0        # negative → auto-compute (1/3)*m*L²
  k: 0.1
  g: 9.81

initial_state:
  y: 0.0
  theta_deg: 5.0   # pole initial angle [deg]
  dy: 0.0
  dtheta: 0.0

controller:
  dt: 0.01
  sim_time: 10.0

  # Outer: y → theta_ref.  theta_ref = -outer_pid.step(0, y)
  #   y>0 → need lean RIGHT (θ_ref>0) → push cart LEFT.
  outer_pid:
    Kp: 2.0
    Ki: 0.1
    Kd: 4.0
    out_min: -0.15    # smaller tilt → less destabilizing
    out_max: 0.15
    int_max: 0.1

  # Inner: theta → F.  u = -inner_pid.step(theta_ref, theta)
  inner_pid:
    Kp: 150.0
    Ki: 8.0
    Kd: 30.0
    out_min: -150.0
    out_max: 150.0
    int_max: 50.0
